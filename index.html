<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Twain Teamplanner</title>
  <style>
    :root{
      --bg:#f7f4ef;
      --paper:#ffffff;
      --navy:#084493;
      --navy-strong:#0e2240;
      --ink:#243447;
      --muted:#6b7280;
      --line:#d8d3ca;
      --line-soft:#ede9e1;
      --soft-blue:rgba(8,68,147,.06);
      --soft-green:#ebf8f1;
      --soft-gold:#fff8ee;
      --soft-red:#fff2ed;
      --shadow:0 20px 50px rgba(8,68,147,.08);
      --jens:#084493;
      --stijn:#3c7c59;
      --hermann:#a66f2c;
      --vacation:#d86c3f;
      --home:#3c7c59;
      --selected:#d9e8fb;
      --selected-line:#7aa4da;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Allianz Neo","Century Gothic",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(8,68,147,.08), transparent 32%),
        linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color:var(--ink);
      min-height:100vh;
    }

    .shell{
      max-width:1320px;
      margin:0 auto;
      padding:32px 20px 56px;
    }

    .hero{
      background:linear-gradient(135deg, var(--navy) 0%, #0a57b8 100%);
      color:#fff;
      border-radius:10px;
      padding:26px 28px 24px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      margin-bottom:18px;
    }

    .hero:before,
    .hero:after{
      content:"";
      position:absolute;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      pointer-events:none;
    }

    .hero:before{width:220px;height:220px;top:-120px;right:-70px}
    .hero:after{width:160px;height:160px;bottom:-90px;left:-50px}

    .hero h1{
      position:relative;
      z-index:1;
      margin:0 0 8px;
      font-size:36px;
      line-height:1.1;
      color:#fff;
      font-family:"DM Serif Display", Georgia, serif;
      font-weight:400;
    }

    .hero p{
      position:relative;
      z-index:1;
      margin:0;
      color:rgba(255,255,255,.82);
      font-size:14px;
      line-height:1.7;
    }

    .hero-top{
      position:relative;
      z-index:1;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .hero-stats{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .hero-stat{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius:8px;
      padding:14px 16px;
      min-width:160px;
    }

    .hero-stat-label{
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.62);
      margin-bottom:6px;
    }

    .hero-stat-value{
      font-size:28px;
      line-height:1;
      font-weight:700;
      color:#fff;
    }

    .hero-stat-sub{
      margin-top:6px;
      font-size:12px;
      color:rgba(255,255,255,.78);
      line-height:1.4;
    }

    .layout{
      display:grid;
      grid-template-columns:390px minmax(0,1fr);
      gap:22px;
      align-items:start;
    }

    .card{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:10px;
      box-shadow:0 8px 28px rgba(8,68,147,.05);
    }

    .card-head{
      padding:22px 22px 0;
    }

    .card-title{
      margin:0 0 6px;
      font-size:23px;
      line-height:1.25;
      color:var(--navy-strong);
      font-family:"DM Serif Display", Georgia, serif;
      font-weight:400;
    }

    .card-sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .card-body{
      padding:22px;
    }

    .planner-panel{
      display:grid;
      gap:16px;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      font-size:13px;
      background:var(--soft-blue);
      color:var(--navy);
      border:1px solid rgba(8,68,147,.12);
    }

    .status-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#3c7c59;
      flex-shrink:0;
    }

    .status-dot.error{background:#d86c3f}

    .field{
      display:grid;
      gap:8px;
    }

    label{
      display:block;
      font-size:11px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#667085;
    }

    input,select,textarea,button{
      font:inherit;
    }

    textarea,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:7px;
      background:#fff;
      color:var(--ink);
      padding:14px 14px;
      font-size:15px;
      transition:border-color .15s ease, box-shadow .15s ease;
      outline:none;
    }

    textarea:focus,select:focus{
      border-color:rgba(8,68,147,.45);
      box-shadow:0 0 0 4px rgba(8,68,147,.09);
    }

    textarea{
      min-height:88px;
      resize:vertical;
      line-height:1.5;
    }

    .segmented{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .segment{
      border:1.5px solid var(--line);
      border-radius:8px;
      padding:15px 14px;
      background:#fff;
      cursor:pointer;
      transition:all .16s ease;
      text-align:left;
    }

    .segment.active{
      border-color:var(--navy);
      background:var(--soft-blue);
      box-shadow:inset 0 0 0 1px rgba(8,68,147,.08);
    }

    .segment[data-type="home"].active{
      border-color:var(--home);
      background:var(--soft-green);
      box-shadow:inset 0 0 0 1px rgba(60,124,89,.08);
    }

    .segment-title{
      font-size:15px;
      font-weight:700;
      color:var(--navy-strong);
      margin-bottom:4px;
    }

    .segment-sub{
      font-size:12px;
      line-height:1.5;
      color:var(--muted);
    }

    .selection-box{
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      background:linear-gradient(180deg,#fff 0%, #fcfbf8 100%);
    }

    .selection-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .selection-range{
      font-size:18px;
      line-height:1.3;
      color:var(--navy-strong);
      font-family:"DM Serif Display", Georgia, serif;
      min-height:24px;
    }

    .selection-sub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .helper-note{
      background:var(--soft-blue);
      border-left:2px solid var(--navy);
      color:var(--muted);
      font-size:13px;
      line-height:1.65;
      padding:14px 14px 14px 16px;
      border-radius:0 6px 6px 0;
    }

    .identity-card{
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      background:linear-gradient(180deg,#fff 0%, #fcfbf8 100%);
      display:grid;
      gap:12px;
    }

    .identity-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .identity-name{
      font-size:20px;
      line-height:1.2;
      color:var(--navy-strong);
      font-family:"DM Serif Display", Georgia, serif;
    }

    .identity-sub{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }

    .user-pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .user-pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--navy-strong);
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      transition:all .15s ease;
    }

    .user-pill.active{
      background:var(--navy);
      border-color:var(--navy);
      color:#fff;
    }

    .button-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:7px;
      padding:14px 18px;
      cursor:pointer;
      text-decoration:none;
      transition:transform .14s ease, box-shadow .14s ease, background .14s ease, opacity .14s ease;
      font-size:14px;
      font-weight:700;
      letter-spacing:.02em;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{cursor:not-allowed;opacity:.55;transform:none}

    .btn-primary{
      background:var(--navy);
      color:#fff;
      box-shadow:0 12px 26px rgba(8,68,147,.18);
    }

    .btn-secondary{
      background:#fff;
      color:var(--navy);
      border:1px solid var(--line);
    }

    .btn-danger{
      background:#fff;
      color:#b45309;
      border:1px solid #efcfba;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:center;
      padding:22px 22px 0;
      flex-wrap:wrap;
    }

    .toolbar-left,.toolbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .month-title{
      font-size:26px;
      font-family:"DM Serif Display", Georgia, serif;
      color:var(--navy-strong);
      margin:0 8px;
      min-width:210px;
      text-align:center;
    }

    .icon-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--navy);
      border-radius:999px;
      width:40px;
      height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:18px;
    }

    .filter-pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .pill{
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      cursor:pointer;
      transition:all .15s ease;
    }

    .pill.active{
      color:#fff;
      background:var(--navy);
      border-color:var(--navy);
    }

    .summary-strip{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      padding:0 22px 18px;
      margin-top:18px;
    }

    .person-summary{
      border:1px solid var(--line-soft);
      border-radius:8px;
      padding:16px 16px 14px;
      background:linear-gradient(180deg,#fff 0%, #fcfbf8 100%);
    }

    .person-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      gap:12px;
    }

    .person-name{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:15px;
      font-weight:700;
      color:var(--navy-strong);
    }

    .person-dot{
      width:11px;
      height:11px;
      border-radius:50%;
      flex-shrink:0;
    }

    .person-counts{
      display:flex;
      gap:10px;
      font-size:12px;
      color:var(--muted);
    }

    .count-chip{
      background:var(--bg);
      border-radius:999px;
      padding:6px 10px;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .count-chip strong{
      color:var(--navy-strong);
      font-size:13px;
    }

    .month-entry-list{
      display:grid;
      gap:8px;
      margin-top:12px;
    }

    .month-entry{
      border:1px solid var(--line-soft);
      border-radius:8px;
      padding:10px 12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .month-entry-meta{
      min-width:0;
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }

    .month-entry-title{
      font-weight:700;
      color:var(--navy-strong);
      margin-bottom:2px;
    }

    .entry-remove{
      border:none;
      background:transparent;
      color:#b45309;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      padding:4px 0 4px 8px;
      flex-shrink:0;
    }
